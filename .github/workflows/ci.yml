name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install flask werkzeug pandas "numpy<2.0" joblib xgboost scikit-learn shap pdfplumber requests pytest

      - name: Run tests
        run: |
          pytest tests/ -v
